<!-- canvas.component.html -->
<div class="canvas-wrapper-container">
  <!-- 左上角交汇处的小方块 -->
  <div class="ruler-corner"></div>

  <!-- 水平标尺 -->
  <div class="ruler-h-container">
    <app-ruler type="h"></app-ruler>
  </div>

  <!-- 垂直标尺 -->
  <div class="ruler-v-container">
    <app-ruler type="v"></app-ruler>
  </div>
  
  <div class="canvas-viewport" [class.panning-mode]="state.isSpacePressed()" #viewport 
    (click)="onCanvasClick($event)" (scroll)="syncRulers($event)" [ngStyle]="gridStyle()"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
    >
    <app-guide-layer />

    <!-- 变换层：缩放核心 -->
    <app-canvas-board></app-canvas-board>
  </div>

  <!-- 底部状态栏 (缩放比例显示) -->
  <div class="canvas-footer" (mousedown)="$event.stopPropagation()" (click)="$event.stopPropagation()">
    <span>{{ (state.scale() * 100).toFixed(0) }}%</span>
    <input type="range" min="0.1" max="2" step="0.05" [value]="state.scale()" (input)="onScaleChange($event)">
  </div>
</div>
